name: easylocation_mvp
description: "Application de gestion de locations immobilières en RDC."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: 0.20.2
  image_picker: ^1.1.0
  path_provider: ^2.1.3
  sentry_flutter: ^9.13.0
  firebase_core: ^4.4.0
  firebase_analytics: ^12.1.2
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  firebase_storage: ^13.0.6
  cloud_functions: ^6.0.6
  firebase_app_check: ^0.4.1+4
  flutter_markdown: ^0.7.7+1
  # Version fixée pour éviter l'erreur 'withValues' sur les SDK Flutter < 3.24
  font_awesome_flutter: ^10.12.0 
  go_router: ^17.1.0
  provider: ^6.1.2
  smooth_page_indicator: ^2.0.1 
  cached_network_image: ^3.3.1
  percent_indicator: ^4.2.5
  webview_flutter: ^4.7.0 
  fl_chart: ^1.1.1 
  url_launcher: ^6.3.0
  http: ^1.2.1 
  permission_handler: ^12.0.1
  flutter_image_compress: ^2.2.0
  shared_preferences: ^2.2.3
  share_plus: ^12.0.1
  pdf: ^3.10.7
  printing: ^5.11.0
  excel: ^4.0.2  
  barcode_widget: ^2.0.4
  mobile_scanner: ^7.1.4
  google_generative_ai: ^0.4.0
  flutter_dotenv: ^6.0.0
  app_links: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_native_splash: ^2.4.0
  flutter_lints: ^6.0.0

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/logo.png
  android_12:
    image: assets/images/logo.png
    color: "#FFFFFF"

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/legal/