name: easylocation_mvp
description: "Application de gestion de locations immobilières en RDC."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  image_picker: ^1.1.0
  path_provider: ^2.1.3
  sentry_flutter: ^9.13.0

  # Firebase Ecosystem (Totalement synchronisés en v4.9+)
  firebase_core: ^4.9.0
  firebase_analytics: ^12.4.1
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  firebase_storage: ^13.4.1
  cloud_functions: ^6.3.1
  firebase_app_check: ^0.4.4+1
  firebase_remote_config: ^6.5.1 
  firebase_messaging: ^16.2.2

  # UI & Navigation
  go_router: ^17.1.0
  provider: ^6.1.2
  smooth_page_indicator: ^2.0.1 
  cached_network_image: ^3.3.1
  percent_indicator: ^4.2.5
  flutter_markdown_plus: ^1.0.7
  font_awesome_flutter: ^11.0.0
  fl_chart: ^1.1.1 
  qr_flutter: ^4.1.0 

  # WebView & Communication
  webview_flutter: ^4.10.0
  url_launcher: ^6.3.0
  http: ^1.2.1 
  app_links: ^7.0.0

  # Outils & Système
  permission_handler: ^12.0.1
  flutter_image_compress: ^2.2.0
  shared_preferences: ^2.2.3
  share_plus: ^10.1.3 
  file_picker: ^8.1.2 
  device_info_plus: ^11.1.0 
  connectivity_plus: ^6.1.0 
  
  # Documents & Scanner
  pdf: ^3.10.7
  printing: ^5.11.0
  file_saver: ^0.2.13
  excel: ^4.0.2  
  barcode_widget: ^2.0.4
  mobile_scanner: ^7.1.4

  # IA & Environnement
  google_generative_ai: ^0.4.0
  flutter_dotenv: ^6.0.0
  flutter_local_notifications: ^21.0.0
  photo_view: ^0.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.0
  flutter_launcher_icons: ^0.13.1

# Configuration pour l'icône de l'application
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"
  min_sdk_android: 21 

# Configuration pour l'écran de démarrage (Splash Screen)
flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/logo.png
  android_12:
    image: assets/images/logo.png
    color: "#FFFFFF"

flutter:
  uses-material-design: true
  
  # --- ASSETS ---
  assets:
    - .env
    - assets/images/
    - assets/legal/
    - assets/fonts/

  # --- CONFIGURATION DES POLICES ---
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700